<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Apê Finder</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&display=swap" rel="stylesheet" />
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --bg: #F7F5F0;
    --bg-card: #FFFFFF;
    --bg-hover: #F0EDE6;
    --text: #2C2926;
    --text-secondary: #6B6560;
    --text-muted: #9B9590;
    --accent: #C45D3E;
    --accent-light: #F4E8E3;
    --accent-dark: #A14A30;
    --green: #4A7C59;
    --green-light: #E8F0EB;
    --yellow: #C49A3E;
    --yellow-light: #F5F0E0;
    --red: #C45D5D;
    --red-light: #F4E3E3;
    --blue: #4A6A8C;
    --blue-light: #E3EBF4;
    --border: #E5E0D8;
    --shadow-sm: 0 1px 3px rgba(44,41,38,0.06);
    --shadow-md: 0 4px 12px rgba(44,41,38,0.08);
    --shadow-lg: 0 8px 30px rgba(44,41,38,0.12);
    --radius: 12px;
    --radius-sm: 8px;
    --font-display: 'Fraunces', serif;
    --font-body: 'DM Sans', sans-serif;
  }
  body { font-family: var(--font-body); background: var(--bg); color: var(--text); min-height: 100vh; }
  input, select, textarea, button { font-family: var(--font-body); }
  
  .fade-in { animation: fadeIn 0.3s ease-out; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  
  .slide-up { animation: slideUp 0.35s ease-out; }
  @keyframes slideUp { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

  .modal-overlay {
    position: fixed; inset: 0; background: rgba(44,41,38,0.4); backdrop-filter: blur(4px);
    display: flex; align-items: flex-start; justify-content: center;
    z-index: 100; overflow-y: auto; padding: 40px 16px;
  }
  .modal-content {
    background: var(--bg-card); border-radius: var(--radius); width: 100%; max-width: 720px;
    box-shadow: var(--shadow-lg); animation: slideUp 0.35s ease-out;
  }

  .btn {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 500;
    border: 1px solid var(--border); background: var(--bg-card); color: var(--text);
    cursor: pointer; transition: all 0.15s ease;
  }
  .btn:hover { background: var(--bg-hover); border-color: var(--text-muted); }
  .btn-primary { background: var(--accent); color: white; border-color: var(--accent); }
  .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn-sm { padding: 5px 10px; font-size: 13px; }
  .btn-danger { color: var(--red); border-color: var(--red); }
  .btn-danger:hover { background: var(--red-light); }

  .input {
    width: 100%; padding: 9px 12px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    font-size: 14px; background: var(--bg-card); color: var(--text); outline: none; transition: border-color 0.15s;
  }
  .input:focus { border-color: var(--accent); }
  .input::placeholder { color: var(--text-muted); }
  textarea.input { resize: vertical; min-height: 60px; }
  select.input { cursor: pointer; }

  .label { display: block; font-size: 13px; font-weight: 500; color: var(--text-secondary); margin-bottom: 4px; }

  .status-novo { background: var(--blue-light); color: var(--blue); }
  .status-favorito { background: var(--green-light); color: var(--green); }
  .status-rejeitado { background: var(--red-light); color: var(--red); }
  .status-visitado { background: var(--yellow-light); color: var(--yellow); }

  .star { cursor: pointer; font-size: 20px; transition: transform 0.1s; }
  .star:hover { transform: scale(1.2); }

  .photo-gallery { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 8px; }
  .photo-gallery img { height: 200px; border-radius: var(--radius-sm); object-fit: cover; flex-shrink: 0; }

  .compare-table { width: 100%; border-collapse: collapse; }
  .compare-table th, .compare-table td { 
    padding: 10px 14px; text-align: left; border-bottom: 1px solid var(--border); font-size: 14px;
  }
  .compare-table th { font-weight: 500; color: var(--text-muted); background: var(--bg); position: sticky; left: 0; }
  .compare-table td { min-width: 200px; }

  .checkbox-wrapper { display: flex; align-items: center; gap: 8px; cursor: pointer; }
  .checkbox-wrapper input[type="checkbox"] { 
    width: 18px; height: 18px; accent-color: var(--accent); cursor: pointer;
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useMemo, useCallback, useRef } = React;

// ============================================================
// CONFIG
// ============================================================
const GITHUB_REPO = 'michellecolin/apartments-database';
const DATA_FILE = 'data.json';
const getToken = () => localStorage.getItem('gh_token') || '';
const setToken = (t) => localStorage.setItem('gh_token', t);
// ============================================================

const STATUSES = [
  { value: 'novo', label: 'Novo', emoji: '🆕' },
  { value: 'visitado', label: 'Visitado', emoji: '👀' },
  { value: 'favorito', label: 'Favorito', emoji: '⭐' },
  { value: 'rejeitado', label: 'Rejeitado', emoji: '❌' },
];

const EVALUATION_CATEGORIES = [
  { key: 'estadoGeral', label: 'Estado Geral' },
  { key: 'banheiroP', label: 'Banheiro Principal' },
  { key: 'outrosBanheiros', label: 'Outros Banheiros' },
  { key: 'cozinha', label: 'Cozinha (móveis/reforma)' },
  { key: 'areaServico', label: 'Área de Serviço' },
  { key: 'quartosArmarios', label: 'Quartos / Armários' },
  { key: 'pisoAcabamento', label: 'Piso / Acabamento' },
  { key: 'sacada', label: 'Sacada' },
  { key: 'elevador', label: 'Elevador' },
];

const defaultApt = () => ({
  id: Date.now().toString(36) + Math.random().toString(36).slice(2, 7),
  fotos: [],
  endereco: '',
  preco: '',
  condominio: '',
  iptu: '',
  quartos: '',
  banheiros: '',
  vagas: '',
  area: '',
  andar: '',
  sacada: false,
  elevador: false,
  churrasqueiraApt: false,
  condPiscina: false,
  condSalaoFestas: false,
  condChurrasqueira: false,
  linkAnuncio: '',
  status: 'novo',
  avaliacoes: EVALUATION_CATEGORIES.reduce((acc, c) => {
    acc[c.key] = { nota: 0, comentario: '' };
    return acc;
  }, {}),
  visita: null,
  createdAt: new Date().toISOString(),
});

const calcMedia = (avaliacoes) => {
  const notas = Object.values(avaliacoes).map(a => a.nota).filter(n => n > 0);
  if (notas.length === 0) return 0;
  return notas.reduce((s, n) => s + n, 0) / notas.length;
};

const fmt = (v) => {
  const num = parseFloat(v);
  if (isNaN(num)) return '—';
  return num.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
};

const fmtNum = (v) => {
  const num = parseFloat(v);
  if (isNaN(num)) return '—';
  return num.toLocaleString('pt-BR');
};

// ============================================================
// GitHub API
// ============================================================
let fileSha = null;

async function loadFromGitHub() {
  try {
    const headers = { 'Accept': 'application/vnd.github.v3+json' };
    const token = getToken();
    if (token) headers['Authorization'] = `Bearer ${token}`;
    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_FILE}`, { headers });
    if (res.status === 404) return [];
    if (!res.ok) throw new Error(`GitHub GET ${res.status}`);
    const json = await res.json();
    fileSha = json.sha;
    const content = atob(json.content.replace(/\n/g, ''));
    return JSON.parse(new TextDecoder().decode(new Uint8Array([...content].map(c => c.charCodeAt(0)))));
  } catch (e) {
    console.error('Erro ao carregar do GitHub:', e);
    return null;
  }
}

async function saveToGitHub(data) {
  const token = getToken();
  if (!token) return 'no_token';
  try {
    const content = new TextEncoder().encode(JSON.stringify(data, null, 2));
    const base64 = btoa(String.fromCharCode(...content));
    const body = {
      message: `Atualizar apartamentos - ${new Date().toLocaleString('pt-BR')}`,
      content: base64,
    };
    if (fileSha) body.sha = fileSha;
    const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/${DATA_FILE}`, {
      method: 'PUT',
      headers: {
        'Authorization': `Bearer ${token}`,
        'Accept': 'application/vnd.github.v3+json',
        'Content-Type': 'application/json',
      },
      body: JSON.stringify(body),
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || `GitHub PUT ${res.status}`);
    }
    const json = await res.json();
    fileSha = json.content.sha;
    return true;
  } catch (e) {
    console.error('Erro ao salvar no GitHub:', e);
    return false;
  }
}

// ============================================================
// Components
// ============================================================

function StarRating({ value, onChange, readonly = false }) {
  return (
    <div style={{ display: 'flex', gap: 2 }}>
      {[1,2,3,4,5].map(i => (
        <span key={i} className="star"
          onClick={() => !readonly && onChange(value === i ? 0 : i)}
          style={{ color: i <= value ? '#C49A3E' : '#DDD', cursor: readonly ? 'default' : 'pointer' }}
        >★</span>
      ))}
    </div>
  );
}

function StatusBadge({ status }) {
  const s = STATUSES.find(x => x.value === status) || STATUSES[0];
  return (
    <span className={`status-${s.value}`} style={{
      padding: '3px 10px', borderRadius: 20, fontSize: 12, fontWeight: 600, display: 'inline-flex', alignItems: 'center', gap: 4
    }}>
      {s.emoji} {s.label}
    </span>
  );
}

function Toast({ message, type, onClose }) {
  useEffect(() => { const t = setTimeout(onClose, 3000); return () => clearTimeout(t); }, []);
  const bg = type === 'success' ? 'var(--green)' : type === 'error' ? 'var(--red)' : 'var(--blue)';
  return (
    <div className="fade-in" style={{
      position: 'fixed', bottom: 24, right: 24, background: bg, color: 'white',
      padding: '12px 20px', borderRadius: 'var(--radius-sm)', fontSize: 14, fontWeight: 500,
      boxShadow: 'var(--shadow-lg)', zIndex: 200, maxWidth: 360,
    }}>
      {message}
    </div>
  );
}

// ============================================================
// ApartmentForm
// ============================================================
function ApartmentForm({ apt, onSave, onClose }) {
  const [form, setForm] = useState(apt ? { ...apt, avaliacoes: { ...apt.avaliacoes } } : defaultApt());
  const [tab, setTab] = useState('info');

  const set = (key, val) => setForm(prev => ({ ...prev, [key]: val }));
  const setAvaliacao = (cat, field, val) => setForm(prev => ({
    ...prev,
    avaliacoes: { ...prev.avaliacoes, [cat]: { ...prev.avaliacoes[cat], [field]: val } }
  }));

  const addFoto = () => {
    const url = prompt('URL da foto:');
    if (url && url.trim()) set('fotos', [...form.fotos, url.trim()]);
  };

  const removeFoto = (i) => set('fotos', form.fotos.filter((_, idx) => idx !== i));

  const handleSave = () => {
    if (!form.endereco.trim()) { alert('Preencha o endereço!'); return; }
    onSave(form);
  };

  const inputRow = (label, key, type = 'text', placeholder = '') => (
    <div>
      <label className="label">{label}</label>
      <input className="input" type={type} placeholder={placeholder}
        value={form[key]} onChange={e => set(key, e.target.value)} />
    </div>
  );

  return (
    <div className="fade-in" style={{ maxWidth: 720, margin: '0 auto', padding: '24px 16px' }}>
      <div style={{ marginBottom: 24, display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
        <button className="btn" onClick={onClose}>← Voltar</button>
        <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontWeight: 700 }}>
          {apt ? 'Editar Apartamento' : 'Novo Apartamento'}
        </h2>
        <div style={{ width: 80 }} />
      </div>

      <div style={{ background: 'var(--bg-card)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow-sm)', border: '1px solid var(--border)', overflow: 'hidden' }}>
        <div style={{ display: 'flex', borderBottom: '1px solid var(--border)' }}>
          {[['info', 'Informações'], ['fotos', 'Fotos'], ['avaliacoes', 'Avaliações']].map(([k, l]) => (
            <button key={k} onClick={() => setTab(k)} style={{
              flex: 1, padding: '14px', fontSize: 14, fontWeight: 500, border: 'none', cursor: 'pointer',
              background: tab === k ? 'var(--bg-card)' : 'var(--bg)',
              color: tab === k ? 'var(--accent)' : 'var(--text-secondary)',
              borderBottom: tab === k ? '2px solid var(--accent)' : '2px solid transparent',
            }}>{l}</button>
          ))}
        </div>

        <div style={{ padding: 24 }}>
          {tab === 'info' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              {inputRow('Endereço *', 'endereco', 'text', 'Rua, número, bairro...')}
              {inputRow('Link do Anúncio', 'linkAnuncio', 'url', 'https://...')}
              
              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr', gap: 12 }}>
                {inputRow('Preço (R$)', 'preco', 'number', '500000')}
                {inputRow('Condomínio (R$)', 'condominio', 'number', '800')}
                {inputRow('IPTU (R$)', 'iptu', 'number', '200')}
              </div>

              <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr 1fr 1fr', gap: 12 }}>
                {inputRow('Quartos', 'quartos', 'number', '2')}
                {inputRow('Banheiros', 'banheiros', 'number', '1')}
                {inputRow('Vagas', 'vagas', 'number', '1')}
                {inputRow('Andar', 'andar', 'number', '3')}
              </div>

              {inputRow('Área (m²)', 'area', 'number', '65')}

              <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
                <label className="label" style={{ marginBottom: 0 }}>Apartamento</label>
                <div style={{ display: 'flex', gap: 24, flexWrap: 'wrap' }}>
                  <label className="checkbox-wrapper">
                    <input type="checkbox" checked={form.sacada} onChange={e => set('sacada', e.target.checked)} />
                    <span style={{ fontSize: 14 }}>Sacada</span>
                  </label>
                  <label className="checkbox-wrapper">
                    <input type="checkbox" checked={form.elevador} onChange={e => set('elevador', e.target.checked)} />
                    <span style={{ fontSize: 14 }}>Elevador</span>
                  </label>
                  <label className="checkbox-wrapper">
                    <input type="checkbox" checked={form.churrasqueiraApt} onChange={e => set('churrasqueiraApt', e.target.checked)} />
                    <span style={{ fontSize: 14 }}>Churrasqueira</span>
                  </label>
                </div>
                <label className="label" style={{ marginBottom: 0, marginTop: 8 }}>Condomínio</label>
                <div style={{ display: 'flex', gap: 24, flexWrap: 'wrap' }}>
                  <label className="checkbox-wrapper">
                    <input type="checkbox" checked={form.condPiscina} onChange={e => set('condPiscina', e.target.checked)} />
                    <span style={{ fontSize: 14 }}>Piscina</span>
                  </label>
                  <label className="checkbox-wrapper">
                    <input type="checkbox" checked={form.condSalaoFestas} onChange={e => set('condSalaoFestas', e.target.checked)} />
                    <span style={{ fontSize: 14 }}>Salão de Festas</span>
                  </label>
                  <label className="checkbox-wrapper">
                    <input type="checkbox" checked={form.condChurrasqueira} onChange={e => set('condChurrasqueira', e.target.checked)} />
                    <span style={{ fontSize: 14 }}>Churrasqueira</span>
                  </label>
                </div>
              </div>

              <div>
                <label className="label">Status</label>
                <select className="input" value={form.status} onChange={e => set('status', e.target.value)}>
                  {STATUSES.map(s => <option key={s.value} value={s.value}>{s.emoji} {s.label}</option>)}
                </select>
              </div>
            </div>
          )}

          {tab === 'fotos' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 16 }}>
              <button className="btn" onClick={addFoto} style={{ alignSelf: 'flex-start' }}>
                + Adicionar foto (URL)
              </button>
              {form.fotos.length === 0 && (
                <p style={{ color: 'var(--text-muted)', fontSize: 14, fontStyle: 'italic' }}>
                  Nenhuma foto adicionada. Cole URLs de imagens dos anúncios.
                </p>
              )}
              <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(180px, 1fr))', gap: 12 }}>
                {form.fotos.map((f, i) => (
                  <div key={i} style={{ position: 'relative', borderRadius: 'var(--radius-sm)', overflow: 'hidden', aspectRatio: '4/3' }}>
                    <img src={f} alt="" referrerPolicy="no-referrer" style={{ width: '100%', height: '100%', objectFit: 'cover' }}
                      onError={e => { e.target.style.display = 'none'; }} />
                    <button onClick={() => removeFoto(i)} style={{
                      position: 'absolute', top: 6, right: 6, background: 'rgba(0,0,0,0.6)', color: 'white',
                      border: 'none', borderRadius: '50%', width: 24, height: 24, cursor: 'pointer', fontSize: 12,
                    }}>✕</button>
                  </div>
                ))}
              </div>
            </div>
          )}

          {tab === 'avaliacoes' && (
            <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
              {EVALUATION_CATEGORIES.map(cat => (
                <div key={cat.key} style={{ padding: 16, background: 'var(--bg)', borderRadius: 'var(--radius-sm)' }}>
                  <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 8 }}>
                    <span style={{ fontSize: 14, fontWeight: 600 }}>{cat.label}</span>
                    <StarRating value={form.avaliacoes[cat.key]?.nota || 0}
                      onChange={v => setAvaliacao(cat.key, 'nota', v)} />
                  </div>
                  <textarea className="input" placeholder="Comentário (opcional)..."
                    value={form.avaliacoes[cat.key]?.comentario || ''}
                    onChange={e => setAvaliacao(cat.key, 'comentario', e.target.value)}
                    style={{ minHeight: 50 }} />
                </div>
              ))}
              <div style={{ padding: 16, background: 'var(--accent-light)', borderRadius: 'var(--radius-sm)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <span style={{ fontSize: 15, fontWeight: 700, color: 'var(--accent-dark)' }}>Nota Geral (média)</span>
                <span style={{ fontSize: 22, fontWeight: 700, color: 'var(--accent)', fontFamily: 'var(--font-display)' }}>
                  {calcMedia(form.avaliacoes).toFixed(1)}
                </span>
              </div>
            </div>
          )}
        </div>

        <div style={{ padding: '16px 24px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'flex-end', gap: 10 }}>
          <button className="btn" onClick={onClose}>Cancelar</button>
          <button className="btn btn-primary" onClick={handleSave}>
            {apt ? 'Salvar Alterações' : 'Adicionar Apartamento'}
          </button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// ApartmentDetail
// ============================================================
function ApartmentDetail({ apt, onClose, onEdit, onStatusChange, onDelete, onRateChange, onCommentChange, onSaveComments, onVisitChange }) {
  const media = calcMedia(apt.avaliacoes);
  const [photoIdx, setPhotoIdx] = useState(0);
  const [lightbox, setLightbox] = useState(false);
  const [editingVisit, setEditingVisit] = useState(false);
  const [expandedEval, setExpandedEval] = useState(null);
  const [visitDate, setVisitDate] = useState(apt.visita?.data || '');
  const [visitTime, setVisitTime] = useState(apt.visita?.hora || '');
  const custoMensal = (parseFloat(apt.condominio) || 0) + (parseFloat(apt.iptu) || 0);

  const saveVisit = () => {
    if (visitDate) {
      onVisitChange(apt.id, { data: visitDate, hora: visitTime });
    } else {
      onVisitChange(apt.id, null);
    }
    setEditingVisit(false);
  };

  const clearVisit = () => {
    onVisitChange(apt.id, null);
    setVisitDate('');
    setVisitTime('');
    setEditingVisit(false);
  };

  const fmtVisitDate = (dateStr) => {
    const d = new Date(dateStr + 'T12:00:00');
    return d.toLocaleDateString('pt-BR', { weekday: 'long', day: 'numeric', month: 'long' });
  };

  const prevPhoto = () => setPhotoIdx(i => i > 0 ? i - 1 : apt.fotos.length - 1);
  const nextPhoto = () => setPhotoIdx(i => i < apt.fotos.length - 1 ? i + 1 : 0);

  const features = [
    ['Sacada', apt.sacada],
    ['Elevador', apt.elevador],
    ['Churrasqueira', apt.churrasqueiraApt],
    ['Salão de festas', apt.condSalaoFestas],
    ['Churrasq. cond.', apt.condChurrasqueira],
    ['Piscina', apt.condPiscina],
  ];

  return (
    <div className="fade-in" style={{ maxWidth: 860, margin: '0 auto', padding: '24px 16px' }}>
      {/* Top bar */}
      <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 20 }}>
        <button onClick={onClose} style={{ fontSize: 14, fontWeight: 500, color: 'var(--text-secondary)', cursor: 'pointer', background: 'none', border: 'none', display: 'flex', alignItems: 'center', gap: 6 }}>← Voltar</button>
        <div style={{ display: 'flex', gap: 8 }}>
          <button className="btn btn-sm" onClick={() => onEdit(apt)}>Editar</button>
          <button className="btn btn-sm btn-danger" onClick={() => onDelete(apt.id)}>Excluir</button>
        </div>
      </div>

      {/* Title + badge */}
      <div style={{ display: 'flex', alignItems: 'center', gap: 10, marginBottom: 16, flexWrap: 'wrap' }}>
        <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 500, color: 'var(--text)' }}>{apt.endereco || 'Sem endereço'}</h2>

      {/* Status pills */}
      <div style={{ display: 'flex', gap: 6, marginBottom: 20, flexWrap: 'wrap' }}>
        {STATUSES.map(s => (
          <button key={s.value} onClick={() => onStatusChange(apt.id, s.value)} style={{
            padding: '5px 12px', borderRadius: 20, fontSize: 12, fontWeight: 500, cursor: 'pointer',
            border: '1px solid var(--border)', transition: 'all 0.15s',

      {apt.fotos.length > 0 && (
        <div style={{ marginBottom: 20 }}>
          <div style={{ position: 'relative', borderRadius: 'var(--radius)', overflow: 'hidden', background: 'var(--bg-hover)' }}>

              onClick={() => setLightbox(true)}
              style={{ width: '100%', height: 320, objectFit: 'cover', display: 'block', cursor: 'zoom-in' }}
              onError={e => { e.target.style.display = 'none'; }} />

              <>
                <button onClick={prevPhoto} style={{
                  position: 'absolute', top: '50%', left: 12, transform: 'translateY(-50%)',
                  width: 36, height: 36, borderRadius: '50%', background: 'rgba(255,255,255,0.9)',

                  display: 'flex', alignItems: 'center', justifyContent: 'center',

                  position: 'absolute', top: '50%', right: 12, transform: 'translateY(-50%)',
                  width: 36, height: 36, borderRadius: '50%', background: 'rgba(255,255,255,0.9)',
                  border: 'none', cursor: 'pointer', fontSize: 16, color: 'var(--text)', zIndex: 2,
                  display: 'flex', alignItems: 'center', justifyContent: 'center',
                }}>›</button>
              </>
            )}
            <div style={{ position: 'absolute', bottom: 12, right: 12, background: 'rgba(0,0,0,0.6)', color: 'white', padding: '3px 10px', borderRadius: 12, fontSize: 12, fontWeight: 500 }}>
              {photoIdx + 1} / {apt.fotos.length}
            </div>
          </div>
          {apt.fotos.length > 1 && (
            <div style={{ display: 'flex', gap: 6, marginTop: 8, overflowX: 'auto', paddingBottom: 4 }}>
              {apt.fotos.slice(0, 8).map((f, i) => (
                <div key={i} onClick={() => setPhotoIdx(i)} style={{
                  width: 64, height: 48, borderRadius: 6, overflow: 'hidden', cursor: 'pointer', flexShrink: 0,
                  border: photoIdx === i ? '2px solid var(--accent)' : '2px solid transparent',
                }}>
                  <img src={f} alt="" referrerPolicy="no-referrer" style={{ width: '100%', height: '100%', objectFit: 'cover' }}
                    onError={e => { e.target.style.background = 'var(--bg-hover)'; e.target.style.display = 'none'; }} />
                </div>
              ))}

          )}

      {/* Lightbox */}
      {lightbox && (
        <div onClick={() => setLightbox(false)} style={{
          position: 'fixed', inset: 0, background: 'rgba(0,0,0,0.9)', zIndex: 200,
          display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'zoom-out',
        }}>
          <button onClick={e => { e.stopPropagation(); setLightbox(false); }} style={{
            position: 'absolute', top: 20, right: 20, background: 'rgba(255,255,255,0.15)', border: 'none',
            color: 'white', fontSize: 20, width: 40, height: 40, borderRadius: '50%', cursor: 'pointer',
          }}>✕</button>
          {apt.fotos.length > 1 && (
            <>
              <button onClick={e => { e.stopPropagation(); prevPhoto(); }} style={{
                position: 'absolute', left: 20, top: '50%', transform: 'translateY(-50%)',
                width: 44, height: 44, borderRadius: '50%', background: 'rgba(255,255,255,0.15)',
                border: 'none', cursor: 'pointer', fontSize: 22, color: 'white',
              }}>‹</button>
              <button onClick={e => { e.stopPropagation(); nextPhoto(); }} style={{
                position: 'absolute', right: 20, top: '50%', transform: 'translateY(-50%)',
                width: 44, height: 44, borderRadius: '50%', background: 'rgba(255,255,255,0.15)',
                border: 'none', cursor: 'pointer', fontSize: 22, color: 'white',
              }}>›</button>
            </>

      {/* Link bar */}
      {apt.linkAnuncio && (
        <a href={apt.linkAnuncio} target="_blank" rel="noopener noreferrer" style={{
          display: 'flex', alignItems: 'center', gap: 8, padding: '10px 14px',
          background: 'var(--accent-light)', borderRadius: 'var(--radius-sm)', marginBottom: 20,
          fontSize: 13, textDecoration: 'none', cursor: 'pointer',

          <span style={{ color: 'var(--accent-dark)', fontWeight: 500 }}>Ver anúncio</span>
          <span style={{ color: 'var(--text-secondary)', flex: 1, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{apt.linkAnuncio.replace(/^https?:\/\//, '').substring(0, 60)}...</span>

      {/* Visit banner */}

        <div style={{ padding: '14px 16px', background: 'var(--green-light)', borderRadius: 10, marginBottom: 20, display: 'flex', alignItems: 'flex-end', gap: 12, flexWrap: 'wrap' }}>

          <div style={{ flex: '0 1 100px' }}>
            <label style={{ fontSize: 12, fontWeight: 500, color: 'var(--green)', display: 'block', marginBottom: 4 }}>Hora</label>
            <input className="input" type="time" value={visitTime} onChange={e => setVisitTime(e.target.value)}

            <button className="btn btn-sm" onClick={saveVisit} style={{ background: 'var(--green)', color: 'white', borderColor: 'var(--green)' }}>Salvar</button>

            <div style={{ fontSize: 12, color: 'var(--green)', fontWeight: 500 }}>Visita agendada</div>
            <div style={{ fontSize: 15, color: '#173404', fontWeight: 500 }}>
              {fmtVisitDate(apt.visita.data)}{apt.visita.hora ? ` · ${apt.visita.hora}` : ''}

          </div>
          <button onClick={() => setEditingVisit(true)} style={{
            padding: '6px 14px', borderRadius: 8, fontSize: 12, fontWeight: 500, cursor: 'pointer',
            border: '1px solid var(--green)', background: 'white', color: 'var(--green)',
          }}>Reagendar</button>
        </div>
      ) : (
        <div style={{ padding: '14px 16px', background: 'var(--bg-card)', border: '1px dashed var(--border)', borderRadius: 10, marginBottom: 20, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
          <span style={{ fontSize: 13, color: 'var(--text-muted)' }}>Nenhuma visita agendada</span>

            padding: '6px 14px', borderRadius: 8, fontSize: 12, fontWeight: 500, cursor: 'pointer',

      )}

      {/* Two columns: Valores + Características */}

        {/* Valores */}
        <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: 10, padding: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--text-secondary)', marginBottom: 12, textTransform: 'uppercase', letterSpacing: 0.5 }}>Valores</div>
          <div style={{ fontFamily: 'var(--font-display)', fontSize: 26, fontWeight: 500, color: 'var(--accent)', marginBottom: 4 }}>{fmt(apt.preco)}</div>
          <div style={{ fontSize: 13, color: 'var(--text-secondary)', marginBottom: 12 }}>Preço do imóvel</div>
          {[
            ['Condomínio', apt.condominio ? `${fmt(apt.condominio)}/mês` : '—'],
            ['IPTU', apt.iptu ? `${fmt(apt.iptu)}/mês` : '—'],
          ].map(([label, val]) => (
            <div key={label} style={{ display: 'flex', justifyContent: 'space-between', padding: '6px 0', fontSize: 13, borderBottom: '1px solid var(--border)' }}>
              <span style={{ color: 'var(--text-secondary)' }}>{label}</span>
              <span style={{ fontWeight: 500, color: 'var(--text)' }}>{val}</span>
            </div>
          ))}
          {custoMensal > 0 && (
            <div style={{ display: 'flex', justifyContent: 'space-between', paddingTop: 8, fontSize: 13, marginTop: 2 }}>
              <span style={{ fontWeight: 500, color: 'var(--text-secondary)' }}>Custo mensal</span>
              <span style={{ fontWeight: 500, color: 'var(--accent)' }}>{fmt(custoMensal)}/mês</span>
            </div>
          )}
        </div>

        {/* Características */}
        <div style={{ background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: 10, padding: 16 }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--text-secondary)', marginBottom: 12, textTransform: 'uppercase', letterSpacing: 0.5 }}>Características</div>
          <div style={{ display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 8 }}>
            {[
              [apt.quartos || '—', 'quartos'],
              [apt.banheiros || '—', 'banheiros'],
              [apt.vagas || '—', apt.vagas === '1' ? 'vaga' : 'vagas'],
              [apt.area ? `${fmtNum(apt.area)} m²` : '—', 'área'],
              [apt.andar ? `${apt.andar}º` : '—', 'andar'],
              [apt.elevador ? 'Sim' : 'Não', 'elevador'],
            ].map(([val, label]) => (
              <div key={label} style={{ padding: '8px 10px', background: 'var(--bg)', borderRadius: 6 }}>
                <div style={{ fontSize: 16, fontWeight: 500, color: 'var(--text)' }}>{val}</div>
                <div style={{ fontSize: 11, color: 'var(--text-secondary)', marginTop: 1 }}>{label}</div>
              </div>
            ))}
          </div>
          <div style={{ display: 'flex', flexWrap: 'wrap', gap: 6, marginTop: 12 }}>
            {features.map(([label, active]) => (
              <span key={label} style={{
                padding: '4px 10px', borderRadius: 14, fontSize: 12, fontWeight: 500,
                background: active ? 'var(--green-light)' : 'var(--bg)',
                color: active ? 'var(--green)' : 'var(--text-muted)',
              }}>{label}</span>
            ))}
          </div>
        </div>
      </div>

      {/* Avaliações */}
      <div style={{ marginBottom: 20 }}>
        <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 12 }}>
          <div style={{ fontSize: 13, fontWeight: 500, color: 'var(--text-secondary)', textTransform: 'uppercase', letterSpacing: 0.5 }}>Avaliações</div>
          <div style={{ textAlign: 'right' }}>
            <div style={{ fontFamily: 'var(--font-display)', fontSize: 28, fontWeight: 500, color: 'var(--accent)' }}>
              {media.toFixed(1)} <span style={{ fontSize: 13, color: 'var(--text-secondary)', fontFamily: 'var(--font-body)', fontWeight: 400 }}>/ 5</span>
            </div>
            <div style={{ fontSize: 11, color: 'var(--text-muted)' }}>nota geral</div>
          </div>
        </div>
        <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
          {EVALUATION_CATEGORIES.map(cat => {
            const av = apt.avaliacoes[cat.key];
            if (!av) return null;
            const isExpanded = expandedEval === cat.key;
            return (
              <div key={cat.key} style={{
                background: 'var(--bg-card)', border: '1px solid var(--border)', borderRadius: 'var(--radius-sm)',
                overflow: 'hidden',
              }}>
                <div style={{ display: 'flex', alignItems: 'center', padding: '10px 14px' }}>
                  <span style={{ flex: 1, fontSize: 13, color: 'var(--text)' }}>{cat.label}</span>
                  <div style={{ display: 'flex', gap: 2 }}>
                    {[1,2,3,4,5].map(i => (
                      <span key={i} className="star" onClick={() => {
                        const newNota = av.nota === i ? 0 : i;
                        onRateChange(apt.id, cat.key, newNota);
                        if (newNota > 0 && !isExpanded) setExpandedEval(cat.key);
                      }}
                        style={{ fontSize: 14, color: i <= av.nota ? '#C49A3E' : 'var(--border)', cursor: 'pointer' }}>★</span>
                    ))}
                  </div>
                  <span onClick={() => setExpandedEval(isExpanded ? null : cat.key)} style={{
                    width: 18, height: 18, borderRadius: '50%',
                    background: av.comentario ? 'var(--yellow-light)' : 'var(--bg)',
                    display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                    fontSize: 10, color: av.comentario ? 'var(--yellow)' : 'var(--text-muted)',
                    marginLeft: 8, cursor: 'pointer',
                  }}>💬</span>
                </div>
                {isExpanded && (
                  <div style={{ padding: '0 14px 10px' }}>
                    <textarea className="input" placeholder="Adicionar comentário..."
                      value={av.comentario || ''}
                      onChange={e => onCommentChange(apt.id, cat.key, e.target.value)}
                      onBlur={onSaveComments}
                      style={{ minHeight: 40, fontSize: 13 }} />
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </div>
  );
}

// ============================================================
// CompareView
// ============================================================
function CompareView({ apts, onClose }) {
  if (apts.length < 2) return null;
  const rows = [
    ['Preço', a => fmt(a.preco)],
    ['Condomínio', a => fmt(a.condominio)],
    ['IPTU', a => fmt(a.iptu)],
    ['Custo mensal total', a => fmt((parseFloat(a.condominio) || 0) + (parseFloat(a.iptu) || 0))],
    ['Quartos', a => a.quartos || '—'],
    ['Banheiros', a => a.banheiros || '—'],
    ['Vagas', a => a.vagas || '—'],
    ['Área', a => a.area ? `${fmtNum(a.area)} m²` : '—'],
    ['Andar', a => a.andar || '—'],
    ['Sacada', a => a.sacada ? '✓ Sim' : '✗ Não'],
    ['Elevador', a => a.elevador ? '✓ Sim' : '✗ Não'],
    ['Churrasqueira (apt)', a => a.churrasqueiraApt ? '✓ Sim' : '✗ Não'],
    ['Piscina (cond)', a => a.condPiscina ? '✓ Sim' : '✗ Não'],
    ['Salão de Festas (cond)', a => a.condSalaoFestas ? '✓ Sim' : '✗ Não'],
    ['Churrasqueira (cond)', a => a.condChurrasqueira ? '✓ Sim' : '✗ Não'],
    ...EVALUATION_CATEGORIES.map(cat => [cat.label, a => {
      const av = a.avaliacoes[cat.key];
      return av ? `${'★'.repeat(av.nota)}${'☆'.repeat(5 - av.nota)}` : '—';
    }]),
    ['Nota Geral', a => calcMedia(a.avaliacoes).toFixed(1)],
  ];

  return (
    <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
      <div className="modal-content" style={{ maxWidth: 1000 }}>
        <div style={{ padding: '20px 24px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
          <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 22, fontWeight: 600 }}>Comparação</h2>
          <button className="btn btn-sm" onClick={onClose}>✕</button>
        </div>
        <div style={{ overflow: 'auto', maxHeight: '70vh' }}>
          <table className="compare-table">
            <thead>
              <tr>
                <th></th>
                {apts.map(a => (
                  <td key={a.id} style={{ fontWeight: 700, fontSize: 15 }}>
                    {a.fotos[0] && <img src={a.fotos[0]} alt="" referrerPolicy="no-referrer" style={{ width: '100%', height: 100, objectFit: 'cover', borderRadius: 'var(--radius-sm)', marginBottom: 8 }} />}
                    {a.endereco || 'Sem endereço'}
                    <div style={{ marginTop: 4 }}><StatusBadge status={a.status} /></div>
                  </td>
                ))}
              </tr>
            </thead>
            <tbody>
              {rows.map(([label, fn]) => (
                <tr key={label}>
                  <th>{label}</th>
                  {apts.map(a => <td key={a.id}>{fn(a)}</td>)}
                </tr>
              ))}
            </tbody>
          </table>
        </div>
        <div style={{ padding: '16px 24px', borderTop: '1px solid var(--border)', display: 'flex', justifyContent: 'flex-end' }}>
          <button className="btn" onClick={onClose}>Fechar</button>
        </div>
      </div>
    </div>
  );
}

// ============================================================
// ApartmentCard
// ============================================================
function ApartmentCard({ apt, onClick, onCompareToggle, isCompareSelected }) {
  const media = calcMedia(apt.avaliacoes);
  return (
    <div className="fade-in" onClick={onClick} style={{
      background: 'var(--bg-card)', borderRadius: 'var(--radius)', boxShadow: 'var(--shadow-sm)',
      border: isCompareSelected ? '2px solid var(--accent)' : '1px solid var(--border)',
      cursor: 'pointer', overflow: 'hidden', transition: 'all 0.2s',
    }}
    onMouseEnter={e => { e.currentTarget.style.boxShadow = 'var(--shadow-md)'; e.currentTarget.style.transform = 'translateY(-2px)'; }}
    onMouseLeave={e => { e.currentTarget.style.boxShadow = 'var(--shadow-sm)'; e.currentTarget.style.transform = 'translateY(0)'; }}
    >
      <div style={{ position: 'relative', height: 180, background: '#E5E0D8' }}>
        {apt.fotos[0] ? (
          <img src={apt.fotos[0]} alt="" referrerPolicy="no-referrer" style={{ width: '100%', height: '100%', objectFit: 'cover' }}
            onError={e => { e.target.style.display = 'none'; }} />
        ) : (
          <div style={{ height: '100%', display: 'flex', alignItems: 'center', justifyContent: 'center', color: 'var(--text-muted)', fontSize: 36 }}>🏠</div>
        )}
        <div style={{ position: 'absolute', top: 10, left: 10 }}>
          <StatusBadge status={apt.status} />
        </div>
        {media > 0 && (
          <div style={{
            position: 'absolute', top: 10, right: 10, background: 'rgba(0,0,0,0.7)', color: 'white',
            padding: '3px 8px', borderRadius: 6, fontSize: 13, fontWeight: 700, fontFamily: 'var(--font-display)',
          }}>
            ★ {media.toFixed(1)}
          </div>
        )}
        <div style={{ position: 'absolute', bottom: 10, right: 10 }}
          onClick={e => { e.stopPropagation(); onCompareToggle(apt.id); }}>
          <div style={{
            width: 28, height: 28, borderRadius: 6, display: 'flex', alignItems: 'center', justifyContent: 'center',
            background: isCompareSelected ? 'var(--accent)' : 'rgba(255,255,255,0.9)', color: isCompareSelected ? 'white' : 'var(--text-muted)',
            fontSize: 14, fontWeight: 700, border: '1px solid rgba(0,0,0,0.1)', cursor: 'pointer',
          }}>⇔</div>
        </div>
      </div>
      <div style={{ padding: 16 }}>
        <div style={{ fontSize: 14, fontWeight: 500, marginBottom: 6, lineHeight: 1.3, display: '-webkit-box', WebkitLineClamp: 2, WebkitBoxOrient: 'vertical', overflow: 'hidden' }}>
          {apt.endereco || 'Sem endereço'}
        </div>
        <div style={{ fontSize: 20, fontWeight: 700, color: 'var(--accent)', fontFamily: 'var(--font-display)', marginBottom: 10 }}>
          {fmt(apt.preco)}
        </div>
        <div style={{ display: 'flex', gap: 12, fontSize: 13, color: 'var(--text-secondary)', flexWrap: 'wrap' }}>
          {apt.quartos && <span>🛏 {apt.quartos}</span>}
          {apt.banheiros && <span>🚿 {apt.banheiros}</span>}
          {apt.vagas && <span>🚗 {apt.vagas}</span>}
          {apt.area && <span>📐 {fmtNum(apt.area)}m²</span>}
          {apt.andar && <span>🏢 {apt.andar}º</span>}
        </div>
        {(apt.condominio || apt.iptu) && (
          <div style={{ marginTop: 8, fontSize: 12, color: 'var(--text-muted)' }}>
            {apt.condominio && <span>Cond. {fmt(apt.condominio)}</span>}
            {apt.condominio && apt.iptu && <span> · </span>}
            {apt.iptu && <span>IPTU {fmt(apt.iptu)}</span>}
          </div>
        )}
      </div>
    </div>
  );
}

function App() {

  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [toast, setToast] = useState(null);
  const [view, setView] = useState('list');
  const [editingApt, setEditingApt] = useState(null);
  const [detailApt, setDetailApt] = useState(null);
  const [compareIds, setCompareIds] = useState([]);
  const [showCompare, setShowCompare] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [tokenInput, setTokenInput] = useState(getToken());

  // Filters
  const [search, setSearch] = useState('');
  const [filterStatus, setFilterStatus] = useState('todos');
  const [filterVisita, setFilterVisita] = useState('todos');
  const [filterPrecoMax, setFilterPrecoMax] = useState('');
  const [filterCondMax, setFilterCondMax] = useState('');
  const [filterElevador, setFilterElevador] = useState(false);
  const [filterSacada, setFilterSacada] = useState(false);
  const [filterPiscina, setFilterPiscina] = useState(false);
  const [filterEvals, setFilterEvals] = useState({});
  const [showMoreFilters, setShowMoreFilters] = useState(false);
  const [sortBy, setSortBy] = useState('createdAt');
  const [sortDir, setSortDir] = useState('desc');

  const showToast = (message, type = 'info') => setToast({ message, type });

  useEffect(() => {
    loadFromGitHub().then(data => {
      if (data !== null) {
        setApartments(data);
      } else {
        showToast('Erro ao conectar com GitHub. Verifique token e repositório.', 'error');
      }
      setLoading(false);
    });
  }, []);

  const persist = async (newData) => {
    setApartments(newData);
    setSaving(true);
    const result = await saveToGitHub(newData);
    setSaving(false);
    if (result === true) showToast('Salvo no GitHub ✓', 'success');
    else if (result === 'no_token') showToast('Configure seu token GitHub em ⚙️ para salvar', 'error');
    else showToast('Erro ao salvar no GitHub', 'error');
  };

  const handleSaveApt = (apt) => {
    const exists = apartments.find(a => a.id === apt.id);
    let next;
    if (exists) {
      next = apartments.map(a => a.id === apt.id ? apt : a);
    } else {
      next = [...apartments, apt];
    }
    persist(next);
    setView('list');
    setEditingApt(null);
    setDetailApt(null);
  };

  const handleDelete = (id) => {
    if (!confirm('Tem certeza que quer excluir este apartamento?')) return;
    persist(apartments.filter(a => a.id !== id));
    setDetailApt(null);
  };

  const handleStatusChange = (id, status) => {
    const next = apartments.map(a => a.id === id ? { ...a, status } : a);
    persist(next);
    setDetailApt(prev => prev && prev.id === id ? { ...prev, status } : prev);
  };

  const handleRateChange = (id, catKey, nota) => {
    const next = apartments.map(a => {
      if (a.id !== id) return a;
      return { ...a, avaliacoes: { ...a.avaliacoes, [catKey]: { ...a.avaliacoes[catKey], nota } } };
    });
    persist(next);
  };

  const handleCommentChange = (id, catKey, comentario) => {
    const next = apartments.map(a => {
      if (a.id !== id) return a;
      return { ...a, avaliacoes: { ...a.avaliacoes, [catKey]: { ...a.avaliacoes[catKey], comentario } } };
    });
    setApartments(next);
  };

  const saveComments = () => persist(apartments);

  const handleVisitChange = (id, visita) => {
    const next = apartments.map(a => a.id === id ? { ...a, visita } : a);
    persist(next);
  };

  const toggleCompare = (id) => {
    setCompareIds(prev => {
      if (prev.includes(id)) return prev.filter(x => x !== id);
      if (prev.length >= 3) { showToast('Máximo 3 para comparar', 'info'); return prev; }
      return [...prev, id];
    });
  };

  const activeFilterCount = [
    filterStatus !== 'todos', filterVisita !== 'todos', filterPrecoMax, filterCondMax,
    filterElevador, filterSacada, filterPiscina, ...Object.values(filterEvals).map(v => v > 0),
  ].filter(Boolean).length;

  const clearFilters = () => {
    setSearch(''); setFilterStatus('todos'); setFilterVisita('todos');
    setFilterPrecoMax(''); setFilterCondMax('');
    setFilterElevador(false); setFilterSacada(false); setFilterPiscina(false);
    setFilterEvals({});
  };

  const filteredApts = useMemo(() => {
    let result = [...apartments];
    if (search) {
      const s = search.toLowerCase();
      result = result.filter(a => a.endereco.toLowerCase().includes(s));
    }
    if (filterStatus !== 'todos') result = result.filter(a => a.status === filterStatus);
    if (filterVisita === 'agendado') result = result.filter(a => a.visita);
    if (filterVisita === 'sem') result = result.filter(a => !a.visita);
    if (filterPrecoMax) result = result.filter(a => (parseFloat(a.preco) || 0) <= parseFloat(filterPrecoMax));
    if (filterCondMax) result = result.filter(a => (parseFloat(a.condominio) || 0) <= parseFloat(filterCondMax));
    if (filterElevador) result = result.filter(a => a.elevador);
    if (filterSacada) result = result.filter(a => a.sacada);
    if (filterPiscina) result = result.filter(a => a.condPiscina);
    Object.entries(filterEvals).forEach(([key, minNota]) => {
      if (minNota > 0) result = result.filter(a => (a.avaliacoes[key]?.nota || 0) >= minNota);
    });

    result.sort((a, b) => {
      let va, vb;
      switch (sortBy) {
        case 'preco': va = parseFloat(a.preco) || 0; vb = parseFloat(b.preco) || 0; break;
        case 'area': va = parseFloat(a.area) || 0; vb = parseFloat(b.area) || 0; break;
        case 'nota': va = calcMedia(a.avaliacoes); vb = calcMedia(b.avaliacoes); break;
        case 'condominio': va = parseFloat(a.condominio) || 0; vb = parseFloat(b.condominio) || 0; break;
        default: va = a.createdAt; vb = b.createdAt;
      }
      if (sortDir === 'asc') return va > vb ? 1 : -1;
      return va < vb ? 1 : -1;
    });
    return result;
  }, [apartments, search, filterStatus, filterVisita, filterPrecoMax, filterCondMax, filterElevador, filterSacada, filterPiscina, filterEvals, sortBy, sortDir]);

  if (loading) {
    return (
      <div style={{ minHeight: '100vh', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
        <div style={{ textAlign: 'center' }}>
          <div style={{ fontSize: 48, marginBottom: 16, animation: 'fadeIn 0.5s ease-out' }}>🏠</div>
          <p style={{ color: 'var(--text-secondary)', fontSize: 15 }}>Carregando apartamentos...</p>
        </div>
      </div>
    );
  }

  return (
    <div>
      {view === 'list' && (
        <div style={{ maxWidth: 1200, margin: '0 auto', padding: '24px 16px' }}>
          {/* Header */}
          <header style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center', marginBottom: 28 }}>
            <div>
              <h1 style={{ fontFamily: 'var(--font-display)', fontSize: 32, fontWeight: 700, letterSpacing: '-0.5px' }}>
                🏠 Apê Finder
              </h1>
              <p style={{ color: 'var(--text-muted)', fontSize: 14, marginTop: 2 }}>
                {apartments.length} apartamento{apartments.length !== 1 ? 's' : ''} cadastrado{apartments.length !== 1 ? 's' : ''}
                {saving && <span style={{ color: 'var(--yellow)', marginLeft: 10 }}>⏳ Salvando...</span>}
              </p>
            </div>
            <div style={{ display: 'flex', gap: 8 }}>
              <button className="btn btn-sm" onClick={() => setShowSettings(true)} title="Configurações">⚙️</button>
              {compareIds.length >= 2 && (
                <button className="btn" onClick={() => setShowCompare(true)}>
                  ⇔ Comparar ({compareIds.length})
                </button>
              )}
              <button className="btn btn-primary" onClick={() => { setEditingApt(null); setView('form'); }}>
                + Novo Apê
              </button>
            </div>
          </header>

          {/* Filters */}
          <div style={{
            background: 'var(--bg-card)', borderRadius: 'var(--radius)', padding: 16,
            marginBottom: 24, boxShadow: 'var(--shadow-sm)', border: '1px solid var(--border)',
          }}>
            {/* Row 1: search + status + visita + sort */}
            <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-end' }}>
              <div style={{ flex: '1 1 200px' }}>
                <label className="label">Bairro / Endereço</label>
                <input className="input" placeholder="Córrego Grande..." value={search} onChange={e => setSearch(e.target.value)} />
              </div>
              <div style={{ flex: '0 1 130px' }}>
                <label className="label">Status</label>
                <select className="input" value={filterStatus} onChange={e => setFilterStatus(e.target.value)}>
                  <option value="todos">Todos</option>
                  {STATUSES.map(s => <option key={s.value} value={s.value}>{s.label}</option>)}
                </select>
              </div>
              <div style={{ flex: '0 1 130px' }}>
                <label className="label">Visita</label>
                <select className="input" value={filterVisita} onChange={e => setFilterVisita(e.target.value)}>
                  <option value="todos">Todas</option>
                  <option value="agendado">Agendadas</option>
                  <option value="sem">Sem agendamento</option>
                </select>
              </div>
              <div style={{ flex: '0 1 130px' }}>
                <label className="label">Ordenar por</label>
                <select className="input" value={sortBy} onChange={e => setSortBy(e.target.value)}>
                  <option value="createdAt">Data</option>
                  <option value="preco">Preço</option>
                  <option value="area">Área</option>
                  <option value="nota">Nota</option>
                  <option value="condominio">Condomínio</option>
                </select>
              </div>
              <button className="btn btn-sm" onClick={() => setSortDir(d => d === 'asc' ? 'desc' : 'asc')}
                style={{ marginBottom: 1 }}>
                {sortDir === 'asc' ? '↑' : '↓'}
              </button>
              <button className="btn btn-sm" onClick={() => setShowMoreFilters(v => !v)}
                style={{ marginBottom: 1, position: 'relative' }}>
                {showMoreFilters ? '✕ Menos filtros' : '+ Mais filtros'}
                {activeFilterCount > 0 && !showMoreFilters && (
                  <span style={{ position: 'absolute', top: -6, right: -6, background: 'var(--accent)', color: 'white', borderRadius: '50%', width: 18, height: 18, fontSize: 11, fontWeight: 700, display: 'flex', alignItems: 'center', justifyContent: 'center' }}>{activeFilterCount}</span>
                )}
              </button>
            </div>

            {/* Row 2: expanded filters */}
            {showMoreFilters && (
              <div style={{ marginTop: 16, paddingTop: 16, borderTop: '1px solid var(--border)', display: 'flex', flexDirection: 'column', gap: 14 }}>
                {/* Price + condo */}
                <div style={{ display: 'flex', gap: 12, flexWrap: 'wrap', alignItems: 'flex-end' }}>
                  <div style={{ flex: '0 1 160px' }}>
                    <label className="label">Preço máx (R$)</label>
                    <input className="input" type="number" placeholder="1000000" value={filterPrecoMax} onChange={e => setFilterPrecoMax(e.target.value)} />
                  </div>
                  <div style={{ flex: '0 1 160px' }}>
                    <label className="label">Condomínio máx (R$)</label>
                    <input className="input" type="number" placeholder="1000" value={filterCondMax} onChange={e => setFilterCondMax(e.target.value)} />
                  </div>
                  <div style={{ display: 'flex', gap: 16, alignItems: 'center', flex: '1 1 auto', flexWrap: 'wrap', paddingBottom: 2 }}>
                    {[['Elevador', filterElevador, setFilterElevador], ['Sacada', filterSacada, setFilterSacada], ['Piscina', filterPiscina, setFilterPiscina]].map(([label, val, setter]) => (
                      <label key={label} className="checkbox-wrapper">
                        <input type="checkbox" checked={val} onChange={e => setter(e.target.checked)} />
                        <span style={{ fontSize: 13 }}>{label}</span>
                      </label>
                    ))}
                  </div>
                </div>

                {/* Evaluation filters */}
                <div>
                  <label className="label" style={{ marginBottom: 8 }}>Nota mínima por avaliação</label>
                  <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(220px, 1fr))', gap: 6 }}>
                    {EVALUATION_CATEGORIES.map(cat => (
                      <div key={cat.key} style={{ display: 'flex', alignItems: 'center', gap: 8, padding: '6px 10px', background: 'var(--bg)', borderRadius: 6 }}>
                        <span style={{ flex: 1, fontSize: 12, color: 'var(--text-secondary)' }}>{cat.label}</span>
                        <div style={{ display: 'flex', gap: 1 }}>
                          {[1,2,3,4,5].map(i => (
                            <span key={i} className="star" onClick={() => setFilterEvals(prev => ({ ...prev, [cat.key]: prev[cat.key] === i ? 0 : i }))}
                              style={{ fontSize: 13, color: i <= (filterEvals[cat.key] || 0) ? '#C49A3E' : 'var(--border)', cursor: 'pointer' }}>★</span>
                          ))}
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                {activeFilterCount > 0 && (
                  <button className="btn btn-sm" onClick={clearFilters} style={{ alignSelf: 'flex-start', color: 'var(--red)' }}>
                    Limpar todos os filtros
                  </button>
                )}
              </div>
            )}
          </div>

          {/* Grid */}
          {filteredApts.length === 0 ? (
            <div style={{ textAlign: 'center', padding: 60 }}>
              <div style={{ fontSize: 48, marginBottom: 16 }}>🏠</div>
              <p style={{ color: 'var(--text-muted)', fontSize: 16 }}>
                {apartments.length === 0 ? 'Nenhum apartamento cadastrado ainda.' : 'Nenhum resultado para os filtros aplicados.'}
              </p>
              {apartments.length === 0 && (
                <button className="btn btn-primary" style={{ marginTop: 16 }}
                  onClick={() => { setEditingApt(null); setView('form'); }}>
                  + Adicionar primeiro apê
                </button>
              )}
            </div>
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 16 }}>
              {filteredApts.map(apt => (
                <ApartmentCard key={apt.id} apt={apt}
                  onClick={() => { setDetailApt(apt); setView('detail'); }}
                  onCompareToggle={toggleCompare}
                  isCompareSelected={compareIds.includes(apt.id)} />
              ))}
            </div>
          )}

          {showCompare && (
            <CompareView
              apts={apartments.filter(a => compareIds.includes(a.id))}
              onClose={() => setShowCompare(false)}
            />
          )}
        </div>
      )}

      {view === 'detail' && detailApt && (
        <ApartmentDetail
          apt={apartments.find(a => a.id === detailApt.id) || detailApt}
          onClose={() => { setDetailApt(null); setView('list'); }}
          onEdit={(apt) => { setEditingApt(apt); setView('form'); }}
          onStatusChange={handleStatusChange}
          onDelete={handleDelete}
          onRateChange={handleRateChange}
          onCommentChange={handleCommentChange}
          onSaveComments={saveComments}
          onVisitChange={handleVisitChange}
        />
      )}

      {view === 'form' && (
        <ApartmentForm
          apt={editingApt}
          onSave={handleSaveApt}
          onClose={() => { setEditingApt(null); setView(detailApt ? 'detail' : 'list'); }}
        />
      )}

      {showSettings && (
        <div className="modal-overlay" onClick={e => e.target === e.currentTarget && setShowSettings(false)}>
          <div className="modal-content" style={{ maxWidth: 480 }}>
            <div style={{ padding: '20px 24px', borderBottom: '1px solid var(--border)', display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
              <h2 style={{ fontFamily: 'var(--font-display)', fontSize: 20, fontWeight: 600 }}>⚙️ Configurações</h2>
              <button className="btn btn-sm" onClick={() => setShowSettings(false)}>✕</button>
            </div>
            <div style={{ padding: 24 }}>
              <label className="label">GitHub Token (para salvar alterações)</label>
              <p style={{ fontSize: 12, color: 'var(--text-muted)', marginBottom: 8 }}>
                Gere em github.com/settings/tokens. O token fica salvo apenas no seu navegador.
              </p>
              <input className="input" type="password" placeholder="github_pat_..."
                value={tokenInput} onChange={e => setTokenInput(e.target.value)} />
              <div style={{ display: 'flex', gap: 8, marginTop: 16, justifyContent: 'flex-end' }}>
                <button className="btn" onClick={() => setShowSettings(false)}>Cancelar</button>
                <button className="btn btn-primary" onClick={() => {
                  setToken(tokenInput);
                  setShowSettings(false);
                  showToast('Token salvo no navegador ✓', 'success');
                }}>Salvar</button>
              </div>
            </div>
          </div>
        </div>
      )}

      {toast && <Toast {...toast} onClose={() => setToast(null)} />}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
